# Exp 4 settings, fold 1 only — retrain after preprocessing fix
data:
  index_csv: data/processed/index.csv
  modalities: [t1, t2, flair]
  image_size: 256
  registration: none

split:
  n_folds: 5
  seed: 42
  folds_to_run: [1]

model:
  base_channels: 32

train:
  batch_size: 8
  num_workers: 2
  lr: 0.0001
  epochs: 100
  loss: tversky
  tversky_alpha: 0.6
  tversky_beta: 0.4
  bce_weight: 0.5
  lr_patience: 5
  early_stop_patience: 15
  augment: true

output:
  checkpoint_dir: outputs/checkpoints
  figures_dir: outputs/figures

smoke_test:
  patient_limit: 4
  epochs: 2
  batch_size: 2
